app:
  message: "Development environment message — локальная разработка"
  debug-mode: true

spring:
  datasource:
    url: "jdbc:postgresql://localhost:5432/dev_db"
    username: "dev_user"
    password: "dev_password"
  jpa:
    hibernate:
      ddl-auto: "update"
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  error:
    include-stacktrace: "always"

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: "always"

custom:
  feature-toggle: true  
  cache-ttl-seconds: 60  
  max-retries: 5

security:
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:8080"
    allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
